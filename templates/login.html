<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Team File Repository</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f1f5f9; display: flex; height: 100vh; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { margin-top: 0; margin-bottom: 24px; color: #1e293b; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #475569; font-weight: 500; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #cbd5e1; }
    </style>
    <script>
        function setAction(actionName) {
            document.getElementById('form-action').value = actionName;
        }
    </script>
</head>
<body>

<div class="login-card">
    <h2>Team File Repository</h2>
    
    $error_div
    
    <form method="POST" action="/login">
        <input type="hidden" id="form-action" name="action" value="login">
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        
        <div class="btn-container">
            <button type="submit" onclick="setAction('login')" class="btn-primary">Sign In</button>
            <button type="submit" onclick="setAction('register')" class="btn-secondary">Register</button>
        </div>
    </form>
</div>

</body>
</html>
