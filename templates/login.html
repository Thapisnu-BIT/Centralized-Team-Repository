<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Team File Repository</title>
    <style>
        :root {
            --card-bg: white;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.15);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --input-bg: white;
            --input-border: #e2e8f0;
            --secondary-bg: white;
            --secondary-hover: #f5f3ff;
        }
        [data-theme="dark"] {
            --card-bg: #1a1035;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.5);
            --text-primary: #e8e0f0;
            --text-secondary: #b8a8d8;
            --text-muted: #7c6a9a;
            --input-bg: #1a1035;
            --input-border: #3d2b79;
            --secondary-bg: transparent;
            --secondary-hover: #2d1b69;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transition: background 0.3s;
        }
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 380px;
        }
        h2 {
            margin: 0 0 6px 0;
            color: var(--text-primary);
            text-align: center;
            font-size: 22px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s, background 0.3s;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #7c3aed;
            outline: none;
        }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: opacity 0.2s, background 0.3s;
        }
        button:hover { opacity: 0.9; }
        .btn-primary { background: #7c3aed; color: white; }
        .btn-secondary { background: var(--secondary-bg); color: #7c3aed; border: 1.5px solid #7c3aed; }
        .btn-secondary:hover { background: var(--secondary-hover); opacity: 1; }
    </style>
    <script>
        function setAction(actionName) {
            document.getElementById('form-action').value = actionName;
        }
        (function() {
            const stored = localStorage.getItem('theme');
            if (stored) {
                document.documentElement.setAttribute('data-theme', stored);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

<div class="login-card">
    <h2>&#128193; Team File Repository</h2>
    <p class="subtitle">Sign in to your account</p>
    
    $error_div
    
    <form method="POST" action="/login">
        <input type="hidden" id="form-action" name="action" value="login">
        
        <div class="form-group">
            <label for="username">&#128100; Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">&#128274; Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        
        <div class="btn-container">
            <button type="submit" onclick="setAction('login')" class="btn-primary">&#10132; Sign In</button>
            <button type="submit" onclick="setAction('register')" class="btn-secondary">&#43; Register</button>
        </div>
    </form>
</div>

</body>
</html>
